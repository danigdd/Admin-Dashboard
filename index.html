<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="public/styles/generalStyles.css">
    <link rel="stylesheet" href="public/styles/navbarStyles.css">
    <link rel="stylesheet" href="public/styles/userStyles.css">
    <link rel="stylesheet" href="public/styles/homePageStyles.css">
    <link rel="stylesheet" href="public/styles/sidebarStyles.css">
    <link rel="stylesheet" href="public/styles/miscStyles.css">
</head>
<body>
    <div class="homeContainer">
        <div class="sidebarContainer"></div>
        <div class="mainPageContainer">
            <div class="navbarContainer">
                <div class="navbarSearchBox">
                    <img src="/public/resources/search.svg">
                    <input placeholder="Search...">
                </div>
                <div class="navbarSettings">
                    <img src="public/resources/notis.svg" class="notis">
                    <img src="public/resources/javascript.png" class = "logo">
                    <span>Your username</span>
                </div>
            </div>
            <div class="userProfileContainer"></div>
            <div class="mainLayoutContainer">
                <div class="projectsContainer">
                    <h2>Your Projects</h2>
                    <div class="projectsGrid">
                        <div class="element"></div>
                        <div class="element"></div>
                        <div class="element"></div>
                        <div class="element"></div>
                        <div class="element"></div>
                        <div class="element"></div>
                    </div>
                </div>
                <div class="miscContainer">
                    <div class="announcementsContainer">
                        <h2>Announcements</h2>
                        <div class="announcementsGridWrapper">
                            <div class="announcementsGrid">
                                <div class="element">hi</div>
                                <div class="element">no</div>
                                <div class="element">ok</div>
                            </div>
                        </div>
                    </div>
                    <div class="trendingContainer">
                        <h2>Trending</h2>
                        <div class="trendingGridWrapper">
                            <div class="trendingGrid">
                                <div class="element"></div>
                                <div class="element"></div>
                                <div class="element"></div>
                                <div class="element"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
